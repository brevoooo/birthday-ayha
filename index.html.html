<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Birthday Surprise ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#fff8f0,#ffdce6);
overflow-x:hidden;color:#333;
}
#hearts{position:fixed;inset:0;pointer-events:none}
.heart{position:fixed;font-size:20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh);opacity:0}}
.screen{
min-height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;padding:20px;text-align:center;
}
.glass{
background:rgba(255,255,255,.4);
backdrop-filter:blur(15px);
padding:25px;border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
max-width:700px;width:100%;
}
h1{font-size:2.5rem;margin-bottom:10px}
button{
border:none;border-radius:999px;padding:14px 24px;
cursor:pointer;margin-top:15px;
}
.gallery img{
width:100%;max-width:500px;height:500px;object-fit:cover;
border-radius:25px;
}
.hidden{display:none}
#letter{white-space:pre-wrap;line-height:1.7;text-align:left}
.counter{font-size:1.3rem;margin-top:15px}
</style>
</head>
<body>

<!-- ===== EDIT BAGIAN INI SAJA ===== -->
<script>
const CONFIG={
namaPacar:"AYHAAAAA",
namaKamu:"BRYFIII",
tanggalJadian:"2025-02-02",
musik:"music.mp3",
foto:[
"foto1.HEIC",
"foto2.jpg",
"foto3.HEIC",
"foto4.HEIC",
"foto5.HEIC",
"foto6.jpg",
"foto7.jpg",
],
surat:`Hai Sayangggg ❤️

hehehehe haiii sayanggg akuuu tauu kondisii kitaa lagi susahh bangett buat ketemuu tapii akuuu yakinn pastii nantii kitaa bakall bisaa seringg mainn, akuuu tauuu koo akuuu waktuu ituuu salahh karenaaa akuuu udah terlanjurr emosiii, karenaa akuuu penasarann bangett beeee jadinyaaa akuuu malahhh emosiii kayaaa gituuu, akuuu sebenrnyaa udahh gaa kenapaa napaaa veee cumann akuuu mauuu bikinn ajaaa biar surprise buatt kamuu pas kamuu ultahh EHEHEHEHE AKU BENERAN KANGEN BANGET GILA AKU LIATIN TIKTOK KAMU TERUS CUMAN AKU TAHAN,AKUUU BENERANNN MINTAA MAAAF YAAA SAYANGGG KARENA MALAH DIEMIN KAMU BUKAN CHATT TAPI PAS KAMU LIAT INI PASTI KAMU KAGET AHAHAHAHA III LOVEEE UUU SOO MUCHH SAYANGGG, POKONYA SEMOGA DENGAN TAMBAHNYA UMUR KAMU, KAMU BISA NYENENGIN MAMI PAPI, NURUT SAMA MEREKA, BISA REMISI BEEEE, POKOKNYA DOA AKU KE KAMU SEGALA YANG KAMU LAKUIN ITU BAKALAN BERHASILL SEMANGAT YAAA BEEEE MAAF JUGAA UDAHH KUUU DIEMINN TAPI AKU BENERAN SENENG BISA NGERAYUN ULTAH KAMU LAGI DENGAN STATUS PACARAN AHAHAHAHAHAH SEHAT SEHAT TERUSS YAAAA SAYANGGG IIII LOVEEE UUU SOO MUCHHH SAYANGGG HAPPY BIRTH DAY YANG KE 18

Aku sayanggg kamuuu.`
};
</script>

<div id="hearts"></div>

<section class="screen" id="welcome">
<div class="glass">
<h1>🎂 Happy Birthday ❤️</h1>
<p>Untuk <span id="pacar"></span></p>
<button onclick="openSite()">Open Surprise ✨</button>
</div>
</section>

<section class="screen hidden" id="main">
<div class="glass">
<h1>❤️ <span id="pacar2"></span></h1>
<div class="gallery">
<img id="slide" src="" alt="foto">
</div>
<div class="counter" id="days"></div>
<button onclick="showLetter()">Baca Surat 💌</button>
<audio id="audio" controls style="margin-top:15px;width:100%">
<source src="" type="audio/mpeg">
</audio>
</div>
</section>

<section class="screen hidden" id="letterScreen">
<div class="glass">
<h2>Untuk Kamu ❤️</h2>
<p id="letter"></p>
</div>
</section>

<script>
document.getElementById('pacar').textContent=CONFIG.namaPacar;
document.getElementById('pacar2').textContent=CONFIG.namaPacar;
document.querySelector('#audio source').src=CONFIG.musik;

function openSite(){
document.getElementById('welcome').classList.add('hidden');
document.getElementById('main').classList.remove('hidden');
document.getElementById('audio').load();
}

let i=0;
document.getElementById('slide').src=CONFIG.foto[0];

setInterval(()=>{
i=(i+1)%CONFIG.foto.length;
document.getElementById('slide').src=CONFIG.foto[i];
},3000);

function showLetter(){
document.getElementById('letterScreen').classList.remove('hidden');
const target=document.getElementById('letter');
target.textContent='';
let n=0;
const txt=CONFIG.surat;
const t=setInterval(()=>{
target.textContent+=txt[n]||'';
n++;
if(n>txt.length) clearInterval(t);
},30);
}

function updateDays(){
const start=new Date(CONFIG.tanggalJadian);
const now=new Date();
const days=Math.floor((now-start)/(1000*60*60*24));
document.getElementById('days').textContent='💕 Bersama selama '+days+' hari';
}
updateDays();

setInterval(()=>{
const h=document.createElement('div');
h.className='heart';
h.innerHTML='💖';
h.style.left=Math.random()*100+'vw';
h.style.top='-30px';
h.style.animationDuration=(4+Math.random()*4)+'s';
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},250);
</script>
</body>
</html>
