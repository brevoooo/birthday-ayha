<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy 18th Birthday ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffe4ec,#fff);overflow-x:hidden}
section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center}
h1{font-size:3rem}
button{padding:14px 28px;border:none;border-radius:999px;font-size:1rem}
.gallery{position:relative;width:320px;height:340px;margin-top:20px}
.photo{position:absolute;width:200px;background:#fff;padding:10px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.photo img{width:100%;height:220px;object-fit:cover;border-radius:8px}
.p1{left:0;top:20px;transform:rotate(-10deg)}
.p2{right:0;top:50px;transform:rotate(8deg)}
.p3{left:60px;top:120px;transform:rotate(-3deg)}
.letter{max-width:800px;background:#fff;padding:25px;border-radius:20px;line-height:1.8;box-shadow:0 8px 20px rgba(0,0,0,.1);white-space:pre-line;text-align:left}
video{width:min(90vw,700px);border-radius:20px}
.fade{opacity:0;transform:translateY(30px);transition:1s}
.show{opacity:1;transform:none}
#loading{position:fixed;inset:0;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;font-size:2rem;z-index:9999}
canvas{position:fixed;inset:0;pointer-events:none}
</style>
</head>
<body>

<div id="loading">❤️ Loading...</div>

<script>
const DATA={
namaPacar:"Nama Pacar",
namaKamu:"Nama Kamu",
surat:`Hai sayang,

Selamat ulang tahun ke-18 ❤️

Tulis surat panjangmu di sini.

Aku sayang kamu.

- Nama Kamu`
};
</script>

<audio id="music" loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

<section>
<h1>🎂 Happy 18th Birthday</h1>
<h2 id="nama"></h2>
<p>Untuk seseorang yang spesial ❤️</p><br>
<button onclick="start()">Buka Hadiah 🎁</button>
</section>

<section class="fade">
<h2>📸 Kenangan Kita</h2>
<div class="gallery">
<div class="photo p1"><img src="foto1.jpg"></div>
<div class="photo p2"><img src="foto2.jpg"></div>
<div class="photo p3"><img src="foto3.jpg"></div>
</div>
</section>

<section class="fade">
<h2>🎥 Video Kenangan</h2><br>
<video controls>
<source src="kenangan.mp4" type="video/mp4">
</video>
</section>

<section class="fade">
<h2>💌 Surat Untukmu</h2><br>
<div class="letter" id="surat"></div>
</section>

<section class="fade">
<h1>❤️ I Love You ❤️</h1>
<h2 id="ending"></h2>
</section>

<canvas id="c"></canvas>

<script>
setTimeout(()=>document.getElementById("loading").style.display="none",1800);

document.getElementById("nama").textContent=DATA.namaPacar;
document.getElementById("ending").textContent="Happy 18th Birthday "+DATA.namaPacar;
document.getElementById("surat").textContent=DATA.surat;

function start(){
document.getElementById("music").play();
window.scrollTo({top:window.innerHeight,behavior:"smooth"});
}

const io=new IntersectionObserver(es=>{
es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("show")})
});
document.querySelectorAll(".fade").forEach(x=>io.observe(x));

const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize(); addEventListener("resize",resize);

let arr=[...Array(120)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:2+Math.random()*5}));
(function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);
arr.forEach(p=>{
ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();
p.y+=1.5;if(p.y>innerHeight)p.y=-10;
});
requestAnimationFrame(anim);
})();
</script>

</body>
</html>
